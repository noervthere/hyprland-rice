animations {
    enabled = true

    # --- ICE-SPECIFIC BEZIERS ---
    # Quick start, slow finish (like a puck on ice)
    bezier = ice_glide, 0.05, 0.9, 0.1, 1.05
    # Very smooth for fading
    bezier = frost_fade, 0.25, 1, 0.5, 1
    # Sharp and linear for borders
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    # Windows: Snappy entry, smooth exit
    animation = windowsIn, 1, 4, ice_glide, popin 80%
    animation = windowsOut, 1, 3.5, frost_fade, popin 80%
    animation = windowsMove, 1, 4, ice_glide, slide

    # Fades: Make the "frost" appear smoothly
    animation = fadeIn, 1, 4.5, frost_fade
    animation = fadeOut, 1, 4, frost_fade
    animation = fadeDim, 1, 4.5, frost_fade

 # Workspaces: VERTICAL (Up to Down)
 # Using 'slidevert' for that elevator feel you wanted
 animation = workspaces, 1, 5, ice_glide, slidevert
 animation = specialWorkspace, 1, 5, ice_glide, slidevert fade 

 animation = layersIn, 1, 3.5, overshot, popin 90%
 animation = layersOut, 1, 3, ice_glide, popin 90%

    # Border: Smooth color cycling for your Cyan/Blue theme
    animation = border, 1, 10, frost_fade
    animation = borderangle, 1, 50, linear, loop
}


workspace = w[t1], gapsout:80 100  # Sets huge gaps (top/bottom, left/right) for workspace with 1 windows