# ----NVDIA------
source = ~/.config/hypr/nvidia.conf
# --- MONITOR LAYOUT ---
source = ~/.config/hypr/monitors.conf

env = PASSWORD_STORE,basic

$mod = SUPER

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11
exec-once = ~/.local/bin/swayosd-wrapper       # OSD for volume/brightness (SIGUSR1 protected)
exec-once = ~/.local/bin/swayosd-colors-watch   # Auto-update swayosd colors from pywal

#exec-once = waybar
# Remove or comment these out:
# exec-once = QT_STYLE_OVERRIDE=qt6ct-style quickshell &   ← remove (duplicate)
# exec-once = ~/.local/bin/start-quickshell.sh             ← keep only this ONE
# exec-once = swaync                                        ← REMOVE (conflicts with Quickshell notifications)

# Keep these:
exec-once = ~/.local/bin/start-quickshell.sh    # single Quickshell launcher
exec-once = wal -R -n                           # restore last pywal theme
exec-once = mpd-mpris                           # MPRIS for music controller
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = xsettingsd
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = ~/.config/hypr/scripts/virtual_mic.sh
exec-once = awww-daemon
exec-once = systemctl --user start dmemcg-booster-user.service

general {
    gaps_in = 6
    gaps_out = 18
    border_size = 1
    col.active_border = rgb(585b70)
    col.inactive_border = rgb(2a2b36)
    layout = dwindle
    }

decoration {
    rounding = 25

    active_opacity = 0.93
    inactive_opacity = 0.90s
    
    dim_inactive = true
    dim_strength = 0.04
    
    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000040)
        offset = 0 6
    }
    
    blur {
        enabled = true
        size = 7
        passes = 3
        ignore_opacity = true

        contrast = 1.5
        noise = 0.05  
        new_optimizations = true

        special = false
        popups = false
        xray = false
    
        vibrancy = 0.1696
    }
}

source = ~/.config/hypr/animations.conf


input {
    kb_layout = tr
    follow_mouse = 1
    kb_options = caps:super
    touchpad {
        natural_scroll = false
    }
    sensitivity = -0.5
}

dwindle {
    preserve_split = true
}


misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 3
}

bind = $mod, Q, exec, kitty
bind = $mod, X, exec, qs ipc call launcher toggle
bind = $mod, D, exec, pkill rofi || rofi -show drun
bind = $mod, E, exec, thunar
bind = $mod , C, killactive
bind = $mod , space, togglefloating

bind = $mod, W, exec, qs ipc call wallpaper toggle
#bind = $mod, X, exec, hyprlock
bind = $mod, A, exec, qs ipc call dashboard toggle
bind = $mod, R, exec, qs ipc call music toggle
bind = $mod, F, fullscreen

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mod + scroll wheel
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

bind = $mod, P, pseudo
bind = $mod, J, togglesplit

bind = SUPER, N, exec, swaync-client -t -sw
bind = SUPER SHIFT, N, exec, swaync-client -C

#bind = , Print, exec, grim ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"
#bind = , Print, exec, grim -g "$(slurp)" ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"

#bind = , PRINT, exec, hyprshot -m region -o ~/screenshots/
bind = , Print, exec, hyprctl keyword animations:enabled 0; hyprshot -m region -o ~/screenshots/ ; hyprctl keyword animations:enabled 1

#bind = , Menu, exec, ~/.config/scripts/define.sh
#bind = $mod, R, exec, gpu-screen-recorder -w screen -f 30 -a default_output -o ~/screen-recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4 & notify-send "Recording Started"
#bind = $mod SHIFT, R, exec, killall -SIGINT gpu-screen-recorder && notify-send "Recording Stopped"


bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

binde = , F1, exec, amixer set Master toggle
binde = , F2, exec, amixer set Master 1%-
binde = , F3, exec, amixer set Master 1%+
binde = , XF86AudioMute, exec, amixer set Master toggle

# Volume Up + Notification (600ms) - Limit set to 1.3 (130%)
#binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.3 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -t 600 -i audio-volume-high "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2 * 100 + 0.5) "%"}')"

# Volume Down + Notification (600ms)
#binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -t 600 -i audio-volume-low "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2 * 100 + 0.5) "%"}')"
binde = , F1, exec, swayosd-client --output-volume mute-toggle
binde = , F2, exec, swayosd-client --output-volume -5
binde = , F3, exec, swayosd-client --output-volume +5
binde = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -5
binde = , XF86MonBrightnessUp,  exec, swayosd-client --brightness +5
binde = , XF86MonBrightnessDown,exec, swayosd-client --brightness -5
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous


#bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -t 600 -i audio-volume-muted "Volume" "Mute Toggled"

windowrule = match:class Lorien, opacity 0.8 1
windowrule = match:class sublime_text, opacity 0.88 1
windowrule = match:class thunar, opacity 0.9 1
windowrule = match:class Thunar, opacity 0.9 1
windowrule = match:class VSCodium, opacity 0.88 1
windowrule = match:class codium, opacity 0.88 1
windowrule = match:class org.pwmt.zathura, opacity 0.9 1
windowrule = match:class firefox, opacity 1.0 1.0

windowrule = match:class mpv, float on
windowrule = match:class mpv, size 640 360
windowrule = match:class mpv, center on
windowrule = match:class mpv, opacity 1.0 1.0

windowrule = match:float yes, center on

windowrule = match:class scratchterm, float on
windowrule = match:class scratchterm, size 85% 70%
windowrule = match:class scratchterm, center on


layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0, match:namespace swayosd

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0s, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window

layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell


